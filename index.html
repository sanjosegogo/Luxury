<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WNN5GCVZ54"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WNN5GCVZ54', {
        'cookie_prefix': 'sanjose',
        'cookie_domain': 'auto',
        'cookie_flags': 'SameSite=None;Secure',
        'send_page_view': true
      });
      gtag('event', 'app_init', { 'platform': 'github_pages', 'version': 'pink-strike-price' });
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖荷西好物購🇺🇸 - 全球精品代購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fdf8f5; -webkit-tap-highlight-color: transparent; }
        .flower-bg { background-image: radial-gradient(#ffe4e6 1px, transparent 1px); background-size: 20px 20px; }
        .product-card { border-radius: 1.5rem; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; display: flex; flex-direction: column; position: relative; }
        .img-container { position: relative; aspect-ratio: 1/1; background-color: #f3f4f6; overflow: hidden; }
        .img-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; height: 100%; }
        .img-slider::-webkit-scrollbar { display: none; }
        .img-slider img { flex: 0 0 100%; scroll-snap-align: start; object-fit: cover; width: 100%; height: 100%; opacity: 0; transition: opacity 0.3s ease; }
        .img-loaded { opacity: 1 !important; }
        .brand-badge { background: rgba(255, 255, 255, 0.9); padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; color: #d946ef; backdrop-filter: blur(4px); }
        .sale-tag { background: linear-gradient(45deg, #f43f5e, #fb7185); color: white; padding: 4px 12px; border-radius: 0 0 15px 0; font-size: 0.8rem; font-weight: 800; position: absolute; top: 0; left: 0; z-index: 20; }
        
        /* 特賣折數標籤：僅特賣時顯示，放在名稱前 */
        .discount-badge { background: #fee2e2; color: #ef4444; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 800; margin-right: 6px; vertical-align: middle; display: inline-block; border: 1px solid #fecaca; }
        
        @keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        .marquee-content { display: inline-block; white-space: nowrap; animation: marquee 25s linear infinite; }
        .brand-btn-active { background-color: #ec4899 !important; color: #ffffff !important; font-weight: 700 !important; }
        #update-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 8px 16px; border-radius: 50px; font-size: 12px; z-index: 100; display: none; }
    </style>
</head>
<body class="flower-bg">

    <div id="marquee-container" class="bg-pink-500 text-white py-2 overflow-hidden hidden shadow-sm">
        <div class="marquee-content text-sm font-bold" id="marquee-text"></div>
    </div>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-pink-100">
        <div class="max-w-screen-md mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🦋</span>
                <h1 class="text-xl font-bold text-gray-800">聖荷西好物購🇺🇸</h1>
            </div>
            <a href="https://www.facebook.com/groups/183038802197503/" target="_blank" onclick="gtag('event', 'join_facebook')" class="bg-pink-500 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-md">
                加入社團
            </a>
        </div>
    </header>

    <div class="max-w-screen-md mx-auto px-4 mt-6">
        <div id="brand-filter" class="flex flex-wrap gap-2 pb-2">
            <button onclick="filterBySale()" id="btn-sale" class="brand-btn bg-rose-50 text-rose-500 border border-rose-100 px-4 py-1.5 rounded-full text-xs font-bold hidden">🔥 限時特賣</button>
            <button onclick="filterByBrand('all')" id="btn-all" class="brand-btn brand-btn-active px-4 py-1.5 rounded-full border border-pink-100 text-xs shadow-sm">所有商品</button>
        </div>
    </div>

    <main class="max-w-screen-md mx-auto px-4 py-4">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div id="loading-state" class="col-span-full text-center py-24 text-gray-400">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-pink-200 border-t-pink-500 rounded-full mb-4"></div>
                <p class="text-sm font-medium">正在取得最新優惠...</p>
            </div>
        </div>
    </main>

    <footer class="text-center py-12 bg-white/50 mt-10 text-gray-400 text-xs border-t border-pink-50">
        <p class="font-bold text-gray-600 text-sm mb-1">聖荷西好物購🇺🇸</p>
        <div class="bg-white mx-auto max-w-xs p-4 rounded-2xl shadow-sm border border-pink-50 text-gray-500 my-6">
            <a href="https://www.google.com/maps/search/?api=1&query=台北市長春路380號1樓" target="_blank" onclick="gtag('event', 'open_map')" class="block">
                <p class="font-bold mb-1 text-pink-500"><i class="fas fa-map-marker-alt mr-1"></i> 長春路總店</p>
                <p>台北市長春路380號1樓</p>
            </a>
        </div>
    </footer>

    <div id="update-toast">✨ 發現新折扣，已為你更新</div>

    <script>
        const _0xAPI = "https://script.google.com/macros/s/AKfycbx64j6HKGdHQVaYDw_7XN7YXK6kl5kUgBTCiEJ2tkKdevuu2bZ0S-WNDOdGk8Ytluum/exec";
        const _FB_URL = 'https://www.facebook.com/groups/183038802197503/';
        const CACHE_KEY = 'sanjose_products_cache_v4'; 
        const MARQUEE_KEY = 'sanjose_marquee_cache';

        let allProducts = [];

        function parseDiscount(val) {
            if (!val || val === "") return null;
            let num = parseFloat(val.toString().replace(/[^0-9.]/g, ''));
            if (isNaN(num)) return null;
            if (num > 0 && num < 1) num = num * 100;
            else if (num > 0 && num < 10) num = num * 10;
            return "特價再下殺" + Math.round(num) + "折";
        }

        function formatPrice(val) {
            if (!val || val === '0' || val === '') return null;
            const num = parseInt(val.toString().replace(/[^\d]/g, ''), 10);
            return isNaN(num) ? null : 'NT$ ' + num.toLocaleString();
        }

        async function init() {
            const cachedData = localStorage.getItem(CACHE_KEY);
            const cachedMarquee = localStorage.getItem(MARQUEE_KEY);
            if (cachedMarquee) {
                const msgs = JSON.parse(cachedMarquee);
                document.getElementById('marquee-text').innerText = `🌸 ${msgs.join('　✨　')} 🌸`;
                document.getElementById('marquee-container').classList.remove('hidden');
            }
            if (cachedData) {
                allProducts = JSON.parse(cachedData);
                document.getElementById('loading-state').style.display = 'none';
                if (allProducts.some(p => p.isSale)) document.getElementById('btn-sale').classList.remove('hidden');
                updateBrandFilters(allProducts);
                renderProducts(allProducts);
            }
            syncData();
        }

        async function syncData() {
            try {
                fetch(`${_0xAPI}?action=marquee`).then(res => res.json()).then(msgs => {
                    localStorage.setItem(MARQUEE_KEY, JSON.stringify(msgs));
                    if (msgs.length > 0) {
                        document.getElementById('marquee-text').innerText = `🌸 ${msgs.join('　✨　')} 🌸`;
                        document.getElementById('marquee-container').classList.remove('hidden');
                    }
                }).catch(()=>{});

                const response = await fetch(`${_0xAPI}?action=get_data`);
                const rows = await response.json();
                
                const newData = rows.filter(row => (row[1] === true || row[1] === 'TRUE') && row[5]).map(row => {
                    const hasSpecial = row[8] && row[8].toString().trim() !== ''; 
                    return {
                        id: row[0], 
                        isSale: row[2]?.toString().trim() !== '', 
                        saleLabel: row[2]?.toString().trim(),
                        discount: hasSpecial ? parseDiscount(row[4]) : null, 
                        name: row[5], 
                        marketPrice: formatPrice(row[6]), 
                        salePrice: formatPrice(row[7]), 
                        specialPrice: formatPrice(row[8]), 
                        size: row[9], 
                        brand: row[10] || '其他', 
                        postUrl: row[11], 
                        images: row.slice(12, 17).filter(url => url && url.toString().startsWith('http')) 
                    };
                });

                newData.sort((a, b) => (b.isSale ? 1 : 0) - (a.isSale ? 1 : 0));
                const currentCached = localStorage.getItem(CACHE_KEY);
                if (JSON.stringify(newData) !== currentCached) {
                    allProducts = newData;
                    localStorage.setItem(CACHE_KEY, JSON.stringify(allProducts));
                    document.getElementById('loading-state').style.display = 'none';
                    if (allProducts.some(p => p.isSale)) document.getElementById('btn-sale').classList.remove('hidden');
                    updateBrandFilters(allProducts);
                    renderProducts(allProducts);
                    if(currentCached) {
                        const toast = document.getElementById('update-toast');
                        toast.style.display = 'block';
                        setTimeout(() => toast.style.display = 'none', 3000);
                    }
                }
            } catch (e) {
                console.error("Sync Error:", e);
            }
        }

        function updateBrandFilters(products) {
            const container = document.getElementById('brand-filter');
            const fixedBtns = ['btn-sale', 'btn-all'];
            Array.from(container.children).forEach(child => {
                if (!fixedBtns.includes(child.id)) container.removeChild(child);
            });
            const brands = [...new Set(products.map(p => p.brand))].filter(b => b !== '其他').sort();
            brands.forEach(brand => {
                const btn = document.createElement('button');
                btn.className = 'brand-btn bg-white px-4 py-1.5 rounded-full border border-pink-50 text-xs text-gray-500 shadow-sm transition-all';
                btn.innerText = brand;
                btn.onclick = () => { filterByBrand(brand, btn); gtag('event', 'select_brand', { 'brand_name': brand }); };
                container.appendChild(btn);
            });
        }

        function filterByBrand(brand, btn) {
            document.querySelectorAll('.brand-btn').forEach(b => {
                b.classList.remove('brand-btn-active');
                b.classList.add('bg-white', 'text-gray-500');
            });
            if (btn) btn.classList.add('brand-btn-active');
            else document.getElementById('btn-all').classList.add('brand-btn-active');
            renderProducts(brand === 'all' ? allProducts : allProducts.filter(p => p.brand === brand));
        }

        function filterBySale() {
            document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('brand-btn-active'));
            document.getElementById('btn-sale').classList.add('brand-btn-active');
            renderProducts(allProducts.filter(p => p.isSale));
            gtag('event', 'view_sale');
        }

        function renderProducts(products) {
            const container = document.getElementById('product-container');
            container.innerHTML = products.length === 0 ? '<div class="col-span-full text-center py-20 text-gray-400 text-sm">暫無商品。</div>' : '';
            const fragment = document.createDocumentFragment();
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                const hasSpecial = p.specialPrice !== null;
                const mainDisplayPrice = hasSpecial ? p.specialPrice : p.salePrice;
                const secondaryPrice = hasSpecial ? p.salePrice : null;

                const targetLink = (p.postUrl && p.postUrl !== '') ? p.postUrl : _FB_URL;
                const imagesHTML = p.images.length > 0 
                    ? p.images.map(img => `<img data-src="${img}" class="lazy-img" onclick="handleBuy('${targetLink}', '${p.name}')">`).join('')
                    : `<img src="https://via.placeholder.com/400?text=聖荷西好物購" class="img-loaded">`;

                card.innerHTML = `
                    ${p.isSale ? `<div class="sale-tag">🔥 ${p.saleLabel}</div>` : ''}
                    <div class="img-container">
                        <div class="img-slider">${imagesHTML}</div>
                        <div class="absolute top-3 right-3"><span class="brand-badge">${p.brand}</span></div>
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg leading-tight mb-1">
                                ${p.discount ? `<span class="discount-badge">${p.discount}</span>` : ''}${p.name}
                            </h3>
                            <span class="bg-gray-100 text-gray-500 text-[10px] px-2 py-0.5 rounded uppercase font-medium">SIZE: ${p.size || 'F'}</span>
                        </div>
                        <div class="mt-4">
                            <div class="flex flex-col mb-3 gap-0.5">
                                <span class="text-gray-400 text-[10px] line-through">專櫃價 ${p.marketPrice || '---'}</span>
                                ${secondaryPrice ? `<span class="text-pink-500 text-xs line-through italic font-medium">特價 ${secondaryPrice}</span>` : ''}
                                <span class="text-pink-600 font-black text-2xl tracking-tight">
                                    ${mainDisplayPrice}
                                </span>
                            </div>
                            <button onclick="handleBuy('${targetLink}', '${p.name}')" class="block w-full text-center bg-pink-500 text-white py-2.5 rounded-full text-sm font-bold shadow-md active:scale-95 transition-transform">立即私訊購買</button>
                        </div>
                    </div>`;
                fragment.appendChild(card);
            });
            container.appendChild(fragment);
            
            setTimeout(() => { 
                document.querySelectorAll('.lazy-img').forEach(img => {
                    const src = img.getAttribute('data-src');
                    if (src) { img.src = src; img.onload = () => img.classList.add('img-loaded'); }
                }); 
            }, 50);
        }

        function handleBuy(url, name) {
            gtag('event', 'click_product', { 'product_name': name });
            window.open(url, '_blank');
        }

        init();
    </script>
</body>
</html>
