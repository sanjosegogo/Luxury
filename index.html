    <script>
        const _0xAPI = "https://script.google.com/macros/s/AKfycbx64j6HKGdHQVaYDw_7XN7YXK6kl5kUgBTCiEJ2tkKdevuu2bZ0S-WNDOdGk8Ytluum/exec";
        const _FB_URL = 'https://www.facebook.com/groups/183038802197503/';
        const CACHE_KEY = 'sanjose_products_cache_v9'; 

        let rawProducts = []; 
        let reversedProducts = []; 
        let currentFilteredProducts = []; 
        let currentFilter = { value: 'all', type: 'brand' };

        async function init() {
            // 跑馬燈
            fetch(`${_0xAPI}?action=marquee`).then(res => res.json()).then(msgs => {
                const data = msgs.map(r => Array.isArray(r) ? r[0] : r).filter(m => m && m.trim() !== "");
                if (data.length > 0) {
                    document.getElementById('marquee-text').innerText = `🌸 ${data.join('　✨　')} 🌸`;
                    document.getElementById('marquee-container').classList.remove('hidden');
                }
            });

            // 快取
            const cachedData = localStorage.getItem(CACHE_KEY);
            if (cachedData) {
                const data = JSON.parse(cachedData);
                rawProducts = data;
                reversedProducts = [...data].reverse();
                document.getElementById('loading-state').style.display = 'none';
                processAndRender();
            }
            await syncData();
        }

        async function syncData() {
            try {
                const response = await fetch(`${_0xAPI}?action=get_data`);
                const rows = await response.json();
                
                // 排除標題，抓取庫存(B)=TRUE且有品名(F)的資料
                const validRows = rows.slice(1).filter(row => (row[1] === true || row[1] === 'TRUE') && row[5]);
                
                const newData = validRows.map((row, index) => {
                    const priceG = row[6] ? parseInt(row[6].toString().replace(/[^\d]/g, ''), 10) : 0; // G：專櫃價
                    const priceH = row[7] ? parseInt(row[7].toString().replace(/[^\d]/g, ''), 10) : 0; // H：特價
                    const priceI = row[8] ? parseInt(row[8].toString().replace(/[^\d]/g, ''), 10) : 0; // I：特賣金額

                    // 邏輯：有特賣金額(I)優先使用，否則使用特價(H)
                    const finalPriceNum = priceI > 0 ? priceI : priceH;
                    
                    // 折數邏輯：有特賣金額(I)顯示 E 欄，沒有則顯示 D 欄
                    const displayDiscount = priceI > 0 ? row[4] : row[3];

                    return {
                        id: row[0],
                        originalIndex: index,
                        saleLabel: row[2]?.toString().trim() || null, // C：特賣分類
                        discount: displayDiscount ? parseDiscount(displayDiscount) : null,
                        name: row[5], // F：品名
                        marketPrice: formatPrice(row[6]), // G：專櫃價
                        salePrice: formatPrice(row[7]), // H：特價
                        specialPrice: formatPrice(row[8]), // I：特賣金額
                        finalPrice: finalPriceNum,
                        size: row[9], // J：尺寸
                        brand: row[10] || '其他', // K：品牌
                        postUrl: row[11], // L：臉書連結
                        // 圖片從 M 欄 (index 12) 開始
                        images: row.slice(12, 17).filter(url => url && url.toString().startsWith('http'))
                    };
                });

                if (JSON.stringify(newData) !== localStorage.getItem(CACHE_KEY)) {
                    const wasEmpty = !localStorage.getItem(CACHE_KEY);
                    rawProducts = newData;
                    reversedProducts = [...newData].reverse();
                    localStorage.setItem(CACHE_KEY, JSON.stringify(rawProducts));
                    document.getElementById('loading-state').style.display = 'none';
                    processAndRender();
                    
                    if (!wasEmpty) {
                        const toast = document.getElementById('update-toast');
                        toast.style.display = 'block';
                        setTimeout(() => toast.style.display = 'none', 3000);
                    }
                }
            } catch (e) { console.error(e); }
        }

        function processAndRender() {
            updateFilterButtons();
            
            const params = new URLSearchParams(window.location.search);
            const brandParam = params.get('brand');
            const saleParam = params.get('sale');

            if (saleParam) applyFilter(saleParam, 'sale', false);
            else if (brandParam) applyFilter(brandParam, 'brand', false);
            else applyFilter('all', 'brand', false);
        }

        function updateFilterButtons() {
            const saleContainer = document.getElementById('sale-filter');
            const brandContainer = document.getElementById('brand-filter');
            
            saleContainer.innerHTML = '';
            Array.from(brandContainer.children).forEach(child => { if (child.id !== 'btn-all') brandContainer.removeChild(child); });

            const sales = [...new Set(rawProducts.map(p => p.saleLabel))].filter(Boolean);
            const brands = [...new Set(rawProducts.map(p => p.brand))].filter(b => b !== '其他').sort();

            sales.forEach(label => {
                saleContainer.appendChild(createBtn(label, () => applyFilter(label, 'sale')));
            });

            brands.forEach(brand => {
                brandContainer.appendChild(createBtn(brand, () => applyFilter(brand, 'brand')));
            });
        }

        function createBtn(text, onClick) {
            const btn = document.createElement('button');
            btn.className = 'filter-btn bg-white px-4 py-1.5 rounded-full border border-pink-50 text-xs text-gray-500 shadow-sm transition-all';
            btn.innerText = text;
            btn.onclick = onClick;
            return btn;
        }

        function applyFilter(value, type, updateURL = true) {
            currentFilter = { value, type };
            
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('filter-btn-active');
                b.classList.add('bg-white', 'text-gray-500');
            });

            document.querySelectorAll('.filter-btn').forEach(b => { if(b.innerText === value) b.classList.add('filter-btn-active'); });
            if (value === 'all') document.getElementById('btn-all').classList.add('filter-btn-active');

            if (value === 'all') {
                currentFilteredProducts = [...reversedProducts];
            } else if (type === 'brand') {
                currentFilteredProducts = reversedProducts.filter(p => p.brand === value);
            } else {
                currentFilteredProducts = rawProducts.filter(p => p.saleLabel === value);
            }
            
            executeSortAndRender();

            if (updateURL) {
                const newUrl = new URL(window.location);
                newUrl.searchParams.delete('brand');
                newUrl.searchParams.delete('sale');
                if (value !== 'all') newUrl.searchParams.set(type, value);
                window.history.pushState({}, '', newUrl);
            }
        }

        function handleSortChange() { executeSortAndRender(); }

        function executeSortAndRender() {
            const sortOrder = document.getElementById('sort-order').value;
            let displayList = [...currentFilteredProducts];

            if (sortOrder === 'price-asc') displayList.sort((a, b) => a.finalPrice - b.finalPrice);
            else if (sortOrder === 'price-desc') displayList.sort((a, b) => b.finalPrice - a.finalPrice);
            else if (sortOrder === 'date-new') displayList.sort((a, b) => b.originalIndex - a.originalIndex);
            else if (sortOrder === 'date-old') displayList.sort((a, b) => a.originalIndex - b.originalIndex);

            renderProducts(displayList);
        }

        function renderProducts(products) {
            const container = document.getElementById('product-container');
            container.innerHTML = products.length === 0 ? '<div class="col-span-full text-center py-20 text-gray-400 text-sm">此分類目前暫無商品。</div>' : '';
            
            products.forEach(p => {
                const hasSpecial = p.specialPrice !== null;
                const targetUrl = p.postUrl || _FB_URL;
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    ${p.saleLabel ? `<div class="sale-tag">🔥 ${p.saleLabel}</div>` : ''}
                    <div class="img-container">
                        <div class="img-slider">
                            ${p.images.length > 0 ? p.images.map(img => `<img data-src="${img}" class="lazy-img" onclick="window.open('${targetUrl}', '_blank')">`).join('') : `<img data-src="https://via.placeholder.com/400?text=San+Jose" class="lazy-img" onclick="window.open('${targetUrl}', '_blank')">`}
                        </div>
                        <div class="absolute top-3 right-3"><span class="brand-badge">${p.brand}</span></div>
                        ${p.postUrl ? `<div class="video-hint"><i class="fas fa-play-circle text-pink-400"></i><span>看影音</span></div>` : ''}
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg leading-tight mb-1">
                                ${p.discount ? `<span class="discount-badge">${p.discount}</span>` : ''}${p.name}
                            </h3>
                            <span class="bg-gray-100 text-gray-500 text-[10px] px-2 py-0.5 rounded uppercase font-bold">SIZE: ${p.size || 'F'}</span>
                        </div>
                        <div class="mt-4">
                            <div class="flex flex-col mb-3">
                                <span class="text-gray-400 text-[10px] line-through">專櫃價 ${p.marketPrice || '---'}</span>
                                ${hasSpecial ? `<span class="text-pink-500 text-xs line-through italic font-medium">特價 ${p.salePrice}</span>` : ''}
                                <span class="text-pink-600 font-black text-2xl tracking-tight">${hasSpecial ? p.specialPrice : (p.salePrice || '電洽')}</span>
                            </div>
                            <button onclick="window.open('${targetUrl}', '_blank')" class="block w-full text-center bg-pink-500 text-white py-2.5 rounded-full text-sm font-bold shadow-md active:scale-95 transition-transform shadow-pink-100">立即私訊購買</button>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
            
            setTimeout(() => { 
                document.querySelectorAll('.lazy-img').forEach(img => {
                    const src = img.getAttribute('data-src');
                    if (src) {
                        img.src = src;
                        img.onload = () => img.classList.add('img-loaded');
                    }
                }); 
            }, 100);
        }

        function parseDiscount(val) {
            if (!val) return null;
            let numStr = val.toString().replace(/[^0-9.]/g, '');
            let num = parseFloat(numStr);
            if (!num) return null;
            if (num > 0 && num < 1) num *= 10;
            else if (num >= 10) num /= 10;
            return num + "折";
        }
        
        function formatPrice(val) {
            if (!val || val === '0' || val === '') return null;
            const num = parseInt(val.toString().replace(/[^\d]/g, ''), 10);
            return isNaN(num) ? null : 'NT$ ' + num.toLocaleString();
        }

        init();
    </script>
</body>
</html>
